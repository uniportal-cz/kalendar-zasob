<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalendar planovani zasob</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #1e3a5f;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.5px; }

    header button {
      background: #e67e22;
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    header button:hover { background: #d35400; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* CALENDAR */
    .calendar-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #2c4f7c;
      color: white;
    }

    .cal-nav button {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      width: 36px; height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background 0.2s;
    }
    .cal-nav button:hover { background: rgba(255,255,255,0.3); }
    .cal-nav h2 { font-size: 1.2rem; font-weight: 600; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .cal-day-name {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #666;
      padding: 10px 4px;
      background: #f8f9fa;
      border-bottom: 1px solid #e9ecef;
    }

    .cal-day {
      min-height: 100px;
      border: 1px solid #e9ecef;
      padding: 6px;
      vertical-align: top;
      position: relative;
      cursor: default;
      transition: background 0.15s;
    }

    .cal-day:hover { background: #f8fbff; }

    .cal-day.other-month { background: #fafafa; }
    .cal-day.other-month .day-num { color: #ccc; }

    .cal-day.today { background: #fff8f0; }
    .cal-day.today .day-num {
      background: #e67e22;
      color: white;
      border-radius: 50%;
      width: 24px; height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .day-num {
      font-size: 0.82rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 4px;
      display: inline-block;
    }

    .day-events { display: flex; flex-direction: column; gap: 2px; }

    .event-pill {
      font-size: 0.68rem;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    .event-pill:hover { opacity: 0.8; }

    .status-objednano    { background: #d6eaf8; color: #1a6696; border-left: 3px solid #2e86c1; }
    .status-preprava     { background: #d5f5e3; color: #1e7a4a; border-left: 3px solid #27ae60; }
    .status-doruceno     { background: #e8daef; color: #6c3483; border-left: 3px solid #8e44ad; }
    .status-zpozdeno     { background: #fde8d8; color: #a04000; border-left: 3px solid #e67e22; }
    .status-storno       { background: #f2f3f4; color: #717d7e; border-left: 3px solid #aab7b8; text-decoration: line-through; }

    /* SIDEBAR */
    .sidebar { display: flex; flex-direction: column; gap: 16px; }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .card-header {
      padding: 14px 18px;
      background: #2c4f7c;
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
    }

    /* LEGEND */
    .legend { padding: 14px 18px; display: flex; flex-direction: column; gap: 8px; }
    .legend-item { display: flex; align-items: center; gap: 10px; font-size: 0.82rem; }
    .legend-dot {
      width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
    }

    /* FILTER */
    .filter-bar {
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .filter-bar select, .filter-bar input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.85rem;
      color: #333;
    }

    /* ORDER LIST */
    .order-list { max-height: 380px; overflow-y: auto; }
    .order-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 18px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.15s;
    }
    .order-item:hover { background: #f8f9fa; }
    .order-item:last-child { border-bottom: none; }

    .order-color-bar {
      width: 4px;
      min-height: 40px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .order-info { flex: 1; min-width: 0; }
    .order-name { font-size: 0.85rem; font-weight: 600; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .order-meta { font-size: 0.75rem; color: #888; margin-top: 2px; }
    .order-actions { display: flex; gap: 4px; }
    .order-actions button {
      background: none;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 3px 7px;
      cursor: pointer;
      font-size: 0.75rem;
      color: #555;
      transition: all 0.15s;
    }
    .order-actions button:hover { background: #fee; border-color: #f99; color: #c00; }
    .order-actions button.edit-btn:hover { background: #eff; border-color: #9cf; color: #07a; }

    .empty-list { padding: 24px; text-align: center; color: #aaa; font-size: 0.85rem; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: white;
      border-radius: 14px;
      width: 480px;
      max-width: 95vw;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    .modal-header {
      padding: 18px 24px;
      background: #1e3a5f;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 { font-size: 1rem; font-weight: 600; }
    .modal-close {
      background: none;
      border: none;
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .modal-close:hover { opacity: 1; }

    .modal-body { padding: 24px; display: flex; flex-direction: column; gap: 16px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 0.8rem; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.3px; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 7px;
      font-size: 0.9rem;
      color: #333;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #2c4f7c;
      box-shadow: 0 0 0 3px rgba(44,79,124,0.1);
    }
    .form-group textarea { resize: vertical; min-height: 70px; }

    .modal-footer {
      padding: 16px 24px;
      background: #f8f9fa;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      border-top: 1px solid #eee;
    }

    .btn-cancel {
      padding: 9px 20px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.9rem;
      color: #555;
      transition: all 0.2s;
    }
    .btn-cancel:hover { background: #f0f0f0; }

    .btn-save {
      padding: 9px 24px;
      background: #2c4f7c;
      color: white;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-save:hover { background: #1e3a5f; }

    /* DETAIL MODAL */
    .detail-field { font-size: 0.88rem; }
    .detail-field strong { color: #555; font-size: 0.75rem; text-transform: uppercase; display: block; margin-bottom: 2px; }
    .detail-value { color: #222; }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    /* stats */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #eee;
    }
    .stat-box {
      background: white;
      padding: 14px;
      text-align: center;
    }
    .stat-num { font-size: 1.5rem; font-weight: 700; color: #1e3a5f; }
    .stat-label { font-size: 0.72rem; color: #888; margin-top: 2px; }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>Kalendar planovani zasob</h1>
  <button onclick="openModal()">+ Nova objednavka</button>
</header>

<div class="layout">

  <!-- CALENDAR -->
  <div class="calendar-card">
    <div class="cal-nav">
      <button onclick="prevMonth()">&#8249;</button>
      <h2 id="cal-title"></h2>
      <button onclick="nextMonth()">&#8250;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- STATS -->
    <div class="card">
      <div class="card-header">Prehled</div>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-box"><div class="stat-num" id="stat-all">0</div><div class="stat-label">Celkem</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-active">0</div><div class="stat-label">Aktivnich</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-this-month">0</div><div class="stat-label">Tento mesic</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-delayed">0</div><div class="stat-label">Zpozdeno</div></div>
      </div>
    </div>

    <!-- FILTER -->
    <div class="card">
      <div class="card-header">Filtr</div>
      <div class="filter-bar">
        <input type="text" id="filter-search" placeholder="Hledat nazev / dodavatel..." oninput="renderAll()">
        <select id="filter-status" onchange="renderAll()">
          <option value="">Vsechny stavy</option>
          <option value="objednano">Objednano</option>
          <option value="preprava">V preprave</option>
          <option value="doruceno">Doruceno</option>
          <option value="zpozdeno">Zpozdeno</option>
          <option value="storno">Storno</option>
        </select>
      </div>
    </div>

    <!-- LEGEND -->
    <div class="card">
      <div class="card-header">Legenda</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#2e86c1"></div> Objednano</div>
        <div class="legend-item"><div class="legend-dot" style="background:#27ae60"></div> V preprave</div>
        <div class="legend-item"><div class="legend-dot" style="background:#8e44ad"></div> Doruceno</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e67e22"></div> Zpozdeno</div>
        <div class="legend-item"><div class="legend-dot" style="background:#aab7b8"></div> Storno</div>
      </div>
    </div>

    <!-- ORDER LIST -->
    <div class="card">
      <div class="card-header">Seznam objednavek</div>
      <div class="order-list" id="order-list"></div>
    </div>

  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Nova objednavka</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group full">
          <label>Nazev zasob / polozky *</label>
          <input type="text" id="f-name" placeholder="napr. Kancelarske potreby">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Dodavatel</label>
          <input type="text" id="f-supplier" placeholder="napr. Office Depot">
        </div>
        <div class="form-group">
          <label>Mnozstvi / jednotka</label>
          <input type="text" id="f-qty" placeholder="napr. 5 ks, 10 kg">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Datum objednavky *</label>
          <input type="date" id="f-order-date">
        </div>
        <div class="form-group">
          <label>Ocekavane doruceni *</label>
          <input type="date" id="f-delivery-date">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Stav</label>
          <select id="f-status">
            <option value="objednano">Objednano</option>
            <option value="preprava">V preprave</option>
            <option value="doruceno">Doruceno</option>
            <option value="zpozdeno">Zpozdeno</option>
            <option value="storno">Storno</option>
          </select>
        </div>
        <div class="form-group">
          <label>Cislo objednavky</label>
          <input type="text" id="f-ref" placeholder="napr. OBJ-2026-001">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full">
          <label>Poznamka</label>
          <textarea id="f-note" placeholder="Volitelny komentar..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Zrusit</button>
      <button class="btn-save" onclick="saveOrder()">Ulozit</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="detail-title">Detail objednavky</h3>
      <button class="modal-close" onclick="closeDetail()">&times;</button>
    </div>
    <div class="modal-body" id="detail-body" style="gap:14px"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeDetail()">Zavrit</button>
      <button class="btn-save" id="detail-edit-btn">Upravit</button>
    </div>
  </div>
</div>

<script>
  const MONTHS_CS = ['Leden','Unor','Brezen','Duben','Kveten','Cerven','Cervenec','Srpen','Zari','Rijen','Listopad','Prosinec'];
  const DAYS_CS   = ['Po','Ut','St','Ct','Pa','So','Ne'];
  const STATUS_COLORS = {
    objednano: '#2e86c1',
    preprava:  '#27ae60',
    doruceno:  '#8e44ad',
    zpozdeno:  '#e67e22',
    storno:    '#aab7b8'
  };
  const STATUS_LABELS = {
    objednano: 'Objednano',
    preprava:  'V preprave',
    doruceno:  'Doruceno',
    zpozdeno:  'Zpozdeno',
    storno:    'Storno'
  };

  let currentYear  = new Date().getFullYear();
  let currentMonth = new Date().getMonth();
  let orders = JSON.parse(localStorage.getItem('zasob_orders') || '[]');
  let editingId = null;

  // ---------- STORAGE ----------
  function save() {
    localStorage.setItem('zasob_orders', JSON.stringify(orders));
  }

  // ---------- FILTERS ----------
  function filteredOrders() {
    const search = document.getElementById('filter-search').value.toLowerCase();
    const status = document.getElementById('filter-status').value;
    return orders.filter(o => {
      const matchSearch = !search || o.name.toLowerCase().includes(search) || (o.supplier||'').toLowerCase().includes(search);
      const matchStatus = !status || o.status === status;
      return matchSearch && matchStatus;
    });
  }

  // ---------- CALENDAR ----------
  function renderCalendar() {
    document.getElementById('cal-title').textContent = MONTHS_CS[currentMonth] + ' ' + currentYear;

    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';

    // day names header (Mon-Sun)
    DAYS_CS.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-day-name';
      el.textContent = d;
      grid.appendChild(el);
    });

    const today = new Date();
    const firstDay = new Date(currentYear, currentMonth, 1);
    // Monday-based: getDay() 0=Sun -> 6, 1=Mon -> 0
    let startOffset = (firstDay.getDay() + 6) % 7;
    const daysInMonth   = new Date(currentYear, currentMonth + 1, 0).getDate();
    const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();

    const fo = filteredOrders();

    // Build map: date-string -> orders (by delivery date)
    const byDate = {};
    fo.forEach(o => {
      if (o.deliveryDate) {
        if (!byDate[o.deliveryDate]) byDate[o.deliveryDate] = [];
        byDate[o.deliveryDate].push(o);
      }
      if (o.orderDate && o.orderDate !== o.deliveryDate) {
        const key = o.orderDate + '_order';
        if (!byDate[key]) byDate[key] = [];
        byDate[key].push({ ...o, _isOrder: true });
      }
    });

    const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;

    for (let i = 0; i < totalCells; i++) {
      const cell = document.createElement('div');
      cell.className = 'cal-day';

      let dayNum, dateObj, isCurrentMonth = true;

      if (i < startOffset) {
        dayNum = daysInPrevMonth - startOffset + i + 1;
        dateObj = new Date(currentYear, currentMonth - 1, dayNum);
        isCurrentMonth = false;
        cell.classList.add('other-month');
      } else if (i >= startOffset + daysInMonth) {
        dayNum = i - startOffset - daysInMonth + 1;
        dateObj = new Date(currentYear, currentMonth + 1, dayNum);
        isCurrentMonth = false;
        cell.classList.add('other-month');
      } else {
        dayNum = i - startOffset + 1;
        dateObj = new Date(currentYear, currentMonth, dayNum);
      }

      const isToday = dateObj.toDateString() === today.toDateString();
      if (isToday) cell.classList.add('today');

      const dateStr = dateObj.toISOString().slice(0, 10);

      const numEl = document.createElement('span');
      numEl.className = 'day-num';
      numEl.textContent = dayNum;
      cell.appendChild(numEl);

      const eventsEl = document.createElement('div');
      eventsEl.className = 'day-events';

      // delivery events
      if (byDate[dateStr]) {
        byDate[dateStr].slice(0, 3).forEach(o => {
          const pill = document.createElement('div');
          pill.className = 'event-pill status-' + o.status;
          pill.title = o.name + (o.supplier ? ' | ' + o.supplier : '');
          pill.textContent = o.name;
          pill.onclick = () => openDetail(o.id);
          eventsEl.appendChild(pill);
        });
        if (byDate[dateStr].length > 3) {
          const more = document.createElement('div');
          more.style.cssText = 'font-size:0.65rem;color:#888;padding-left:4px';
          more.textContent = '+' + (byDate[dateStr].length - 3) + ' dalsi';
          eventsEl.appendChild(more);
        }
      }

      cell.appendChild(eventsEl);
      grid.appendChild(cell);
    }
  }

  function prevMonth() {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
  }

  function nextMonth() {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderCalendar();
  }

  // ---------- ORDER LIST ----------
  function renderOrderList() {
    const el = document.getElementById('order-list');
    const fo = filteredOrders().sort((a, b) => (a.deliveryDate || '').localeCompare(b.deliveryDate || ''));

    if (fo.length === 0) {
      el.innerHTML = '<div class="empty-list">Zadne objednavky</div>';
      return;
    }

    el.innerHTML = '';
    fo.forEach(o => {
      const item = document.createElement('div');
      item.className = 'order-item';
      item.innerHTML = `
        <div class="order-color-bar" style="background:${STATUS_COLORS[o.status] || '#aaa'}"></div>
        <div class="order-info">
          <div class="order-name">${esc(o.name)}</div>
          <div class="order-meta">${o.supplier ? esc(o.supplier) + ' &bull; ' : ''}${o.deliveryDate ? 'Doruceni: ' + formatDate(o.deliveryDate) : ''}</div>
          <div class="order-meta" style="margin-top:2px">${o.qty ? esc(o.qty) + ' &bull; ' : ''}<span style="color:${STATUS_COLORS[o.status]};font-weight:600">${STATUS_LABELS[o.status]}</span></div>
        </div>
        <div class="order-actions">
          <button class="edit-btn" onclick="event.stopPropagation();openEdit('${o.id}')">Upravit</button>
          <button onclick="event.stopPropagation();deleteOrder('${o.id}')">Smazat</button>
        </div>
      `;
      item.onclick = () => openDetail(o.id);
      el.appendChild(item);
    });
  }

  // ---------- STATS ----------
  function renderStats() {
    const now = new Date();
    const ym = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
    document.getElementById('stat-all').textContent = orders.length;
    document.getElementById('stat-active').textContent = orders.filter(o => o.status !== 'doruceno' && o.status !== 'storno').length;
    document.getElementById('stat-this-month').textContent = orders.filter(o => (o.deliveryDate || '').startsWith(ym)).length;
    document.getElementById('stat-delayed').textContent = orders.filter(o => o.status === 'zpozdeno').length;
  }

  function renderAll() {
    renderCalendar();
    renderOrderList();
    renderStats();
  }

  // ---------- MODAL ----------
  function openModal(prefill) {
    editingId = null;
    document.getElementById('modal-title').textContent = 'Nova objednavka';
    document.getElementById('f-name').value = '';
    document.getElementById('f-supplier').value = '';
    document.getElementById('f-qty').value = '';
    document.getElementById('f-order-date').value = new Date().toISOString().slice(0,10);
    document.getElementById('f-delivery-date').value = '';
    document.getElementById('f-status').value = 'objednano';
    document.getElementById('f-ref').value = '';
    document.getElementById('f-note').value = '';
    if (prefill) {
      Object.keys(prefill).forEach(k => {
        const el = document.getElementById('f-' + k);
        if (el) el.value = prefill[k];
      });
    }
    document.getElementById('modal-overlay').classList.add('active');
    document.getElementById('f-name').focus();
  }

  function openEdit(id) {
    const o = orders.find(x => x.id === id);
    if (!o) return;
    editingId = id;
    document.getElementById('modal-title').textContent = 'Upravit objednavku';
    document.getElementById('f-name').value = o.name || '';
    document.getElementById('f-supplier').value = o.supplier || '';
    document.getElementById('f-qty').value = o.qty || '';
    document.getElementById('f-order-date').value = o.orderDate || '';
    document.getElementById('f-delivery-date').value = o.deliveryDate || '';
    document.getElementById('f-status').value = o.status || 'objednano';
    document.getElementById('f-ref').value = o.ref || '';
    document.getElementById('f-note').value = o.note || '';
    document.getElementById('modal-overlay').classList.add('active');
    document.getElementById('f-name').focus();
    closeDetail();
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
    editingId = null;
  }

  function saveOrder() {
    const name = document.getElementById('f-name').value.trim();
    const orderDate = document.getElementById('f-order-date').value;
    const deliveryDate = document.getElementById('f-delivery-date').value;

    if (!name) { alert('Zadejte nazev zasob.'); return; }
    if (!orderDate) { alert('Zadejte datum objednavky.'); return; }
    if (!deliveryDate) { alert('Zadejte ocekavane doruceni.'); return; }

    const data = {
      name,
      supplier: document.getElementById('f-supplier').value.trim(),
      qty: document.getElementById('f-qty').value.trim(),
      orderDate,
      deliveryDate,
      status: document.getElementById('f-status').value,
      ref: document.getElementById('f-ref').value.trim(),
      note: document.getElementById('f-note').value.trim(),
    };

    if (editingId) {
      const idx = orders.findIndex(x => x.id === editingId);
      if (idx !== -1) orders[idx] = { ...orders[idx], ...data };
    } else {
      data.id = 'o_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      orders.push(data);
    }

    save();
    closeModal();
    renderAll();
  }

  function deleteOrder(id) {
    if (!confirm('Opravdu smazat tuto objednavku?')) return;
    orders = orders.filter(x => x.id !== id);
    save();
    renderAll();
  }

  // ---------- DETAIL ----------
  function openDetail(id) {
    const o = orders.find(x => x.id === id);
    if (!o) return;
    document.getElementById('detail-title').textContent = o.name;
    document.getElementById('detail-edit-btn').onclick = () => openEdit(id);
    const body = document.getElementById('detail-body');
    const color = STATUS_COLORS[o.status] || '#aaa';
    body.innerHTML = `
      <div class="detail-field"><strong>Stav</strong><div class="detail-value"><span class="status-badge" style="background:${color}22;color:${color}">${STATUS_LABELS[o.status]}</span></div></div>
      ${o.supplier ? `<div class="detail-field"><strong>Dodavatel</strong><div class="detail-value">${esc(o.supplier)}</div></div>` : ''}
      ${o.qty ? `<div class="detail-field"><strong>Mnozstvi</strong><div class="detail-value">${esc(o.qty)}</div></div>` : ''}
      <div class="form-row" style="gap:14px">
        <div class="detail-field"><strong>Datum objednavky</strong><div class="detail-value">${formatDate(o.orderDate)}</div></div>
        <div class="detail-field"><strong>Ocekavane doruceni</strong><div class="detail-value">${formatDate(o.deliveryDate)}</div></div>
      </div>
      ${o.ref ? `<div class="detail-field"><strong>Cislo objednavky</strong><div class="detail-value">${esc(o.ref)}</div></div>` : ''}
      ${o.note ? `<div class="detail-field"><strong>Poznamka</strong><div class="detail-value" style="white-space:pre-wrap">${esc(o.note)}</div></div>` : ''}
    `;
    document.getElementById('detail-overlay').classList.add('active');
  }

  function closeDetail() {
    document.getElementById('detail-overlay').classList.remove('active');
  }

  // ---------- UTILS ----------
  function formatDate(d) {
    if (!d) return '—';
    const [y, m, day] = d.split('-');
    return day + '.' + m + '.' + y;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Close modals on overlay click
  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.getElementById('detail-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeDetail();
  });

  // Demo data if empty
  if (orders.length === 0) {
    const today = new Date();
    const fmt = d => d.toISOString().slice(0,10);
    const add = n => { const d = new Date(today); d.setDate(d.getDate() + n); return fmt(d); };

    orders = [
      { id: 'demo1', name: 'Kancelarske potreby', supplier: 'Office Depot', qty: '3 kartony', orderDate: add(-5), deliveryDate: add(2),  status: 'preprava',  ref: 'OBJ-2026-001', note: '' },
      { id: 'demo2', name: 'Tonerove kazety',     supplier: 'HP Store',     qty: '10 ks',    orderDate: add(-2), deliveryDate: add(5),  status: 'objednano', ref: 'OBJ-2026-002', note: 'Kompatibilni s HP LaserJet 408' },
      { id: 'demo3', name: 'Dezinfekce',          supplier: 'Dez Plus s.r.o', qty: '20 l',   orderDate: add(-10),deliveryDate: add(-1), status: 'doruceno',  ref: 'OBJ-2026-003', note: '' },
      { id: 'demo4', name: 'Hygienicke potreby',  supplier: 'Makro',        qty: '5 baleni', orderDate: add(-8), deliveryDate: add(10), status: 'zpozdeno',  ref: 'OBJ-2026-004', note: 'Dodavatel potvrdil zpozdeni o 1 tyden' },
    ];
    save();
  }

  renderAll();
</script>
</body>
</html>
